<!DOCTYPE html>
<html>
<head>
    <title>Тест геокодинга</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=c902f149-944d-43ed-adb7-65b3e802c06b&lang=ru_RU" type="text/javascript"></script>
</head>
<body>
    <h1>Тест геокодинга адресов</h1>
    
    <div>
        <h3>Пробуем разные варианты адресов:</h3>
        <button onclick="testGeocode('Зеленодольск')">Зеленодольск</button>
        <button onclick="testGeocode('Зеленодольск Юности 3')">Зеленодольск Юности 3</button>
        <button onclick="testGeocode('Юности 3, Зеленодольск')">Юности 3, Зеленодольск</button>
        <button onclick="testGeocode('улица Юности, 3, Зеленодольск')">улица Юности, 3, Зеленодольск</button>
        <br><br>
        <button onclick="testGeocode('Казань')">Казань</button>
        <button onclick="testGeocode('Товарищеская 30')">Товарищеская 30</button>
        <button onclick="testGeocode('Товарищеская улица, 30, Казань')">Товарищеская улица, 30, Казань</button>
        <button onclick="testGeocode('Казань, Товарищеская улица, 30')">Казань, Товарищеская улица, 30</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        function testGeocode(address) {
            console.log('Тестируем адрес:', address);
            document.getElementById('results').innerHTML += `<h4>Тест: "${address}"</h4>`;
            
            ymaps.geocode(address, { results: 1 }).then((res) => {
                const obj = res.geoObjects.get(0);
                if (!obj) {
                    document.getElementById('results').innerHTML += `<p style="color: red;">❌ Не найдено: ${address}</p>`;
                    return;
                }
                const coords = obj.geometry.getCoordinates();
                const addressLine = obj.getAddressLine();
                const result = `✅ [${coords[0]}, ${coords[1]}] - "${addressLine}"`;
                console.log(result);
                document.getElementById('results').innerHTML += `<p>${result}</p>`;
            }).catch((err) => {
                console.error(`Ошибка геокодинга для "${address}":`, err);
                document.getElementById('results').innerHTML += `<p style="color: red;">❌ Ошибка: ${address} - ${err.message}</p>`;
            });
        }
        
        ymaps.ready(() => {
            console.log('Яндекс.Карты готовы для тестирования');
            document.getElementById('results').innerHTML += '<p>🗺️ Карты готовы, можно тестировать!</p>';
        });
    </script>
</body>
</html>
