services:
  # Веб-сервис
  - type: web
    name: poputchiki
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: MONGODB_URL
        sync: false # Будет установлена вручную
    healthCheckPath: /api/health
