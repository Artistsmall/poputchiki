services:
  # Веб-сервис
  - type: web
    name: poputchiki
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: poputchiki-db
          property: connectionString
    healthCheckPath: /api/health
    
  # PostgreSQL база данных
  - type: postgres
    name: poputchiki-db
    plan: free
    ipAllowList: []
    databaseName: poputchiki
    user: poputchiki
