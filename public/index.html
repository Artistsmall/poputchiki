<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Попутчики</title>
    <meta name="description" content="Приложение для поиска попутчиков">
    <meta name="theme-color" content="#0ea5e9">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- Стили -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <!-- Заголовок -->
        <header class="header">
            <h1>🚗 Попутчики</h1>
            <p class="subtitle">Поездки с попутчиками</p>
        </header>

        <!-- Основной контент -->
        <main class="main">
            <!-- Секция аутентификации -->
            <section id="authSection" class="auth-section">
                <div class="auth-container">
                    <div class="auth-tabs">
                        <button id="loginTab" class="tab-btn active">Вход</button>
                        <button id="registerTab" class="tab-btn">Регистрация</button>
                    </div>
                    
                    <form id="authForm" class="auth-form">
                        <div id="nameField" class="field hidden">
                            <label for="name">Имя</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        
                        <div class="field">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="field">
                            <label for="password">Пароль</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">
                            <span id="submitBtnText">Войти</span>
                        </button>
                    </form>
                </div>
            </section>

            <!-- Секция пользователя -->
            <section id="userSection" class="user-section hidden">
                <div class="user-info">
                    <h2 id="userName">Пользователь</h2>
                    <p id="userRole">Роль</p>
                    <button id="logoutBtn" class="btn btn-secondary">Выйти</button>
                </div>

                <!-- Переключатель ролей -->
                <div class="role-switcher">
                    <button id="driverBtn" class="role-btn active">🚗 Водитель</button>
                    <button id="passengerBtn" class="role-btn">👤 Пассажир</button>
                </div>

                <!-- Секция водителя -->
                <div id="driverSection" class="role-section">
                    <h3>Создать поездку</h3>
                    <form id="driverForm" class="form">
                        <div class="field">
                            <label for="driverFrom">Откуда</label>
                            <div class="input-with-btn">
                                <input type="text" id="driverFrom" name="from" required>
                                <button type="button" class="map-btn" data-target="driverFrom">🗺️</button>
                            </div>
                        </div>
                        
                        <div class="field">
                            <label for="driverTo">Куда</label>
                            <div class="input-with-btn">
                                <input type="text" id="driverTo" name="to" required>
                                <button type="button" class="map-btn" data-target="driverTo">🗺️</button>
                            </div>
                        </div>
                        
                        <div class="field">
                            <label for="driverTime">Время отправления</label>
                            <input type="datetime-local" id="driverTime" name="time" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Создать поездку</button>
                    </form>
                    
                    <div class="rides-list">
                        <h3>Мои поездки</h3>
                        <div id="driverRides" class="rides-container">
                            <p>Загрузка...</p>
                        </div>
                    </div>
                </div>

                <!-- Секция пассажира -->
                <div id="passengerSection" class="role-section hidden">
                    <h3>Найти поездку</h3>
                    <form id="searchForm" class="form">
                        <div class="field">
                            <label for="passengerFrom">Откуда</label>
                            <div class="input-with-btn">
                                <input type="text" id="passengerFrom" name="from">
                                <button type="button" class="map-btn" data-target="passengerFrom">🗺️</button>
                            </div>
                        </div>
                        
                        <div class="field">
                            <label for="passengerTo">Куда</label>
                            <div class="input-with-btn">
                                <input type="text" id="passengerTo" name="to">
                                <button type="button" class="map-btn" data-target="passengerTo">🗺️</button>
                            </div>
                        </div>
                        
                        <div class="field">
                            <label for="passengerTime">Время отправления</label>
                            <input type="datetime-local" id="passengerTime" name="time">
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Найти поездки</button>
                    </form>
                    
                    <div class="rides-list">
                        <h3>Доступные поездки</h3>
                        <div id="passengerRides" class="rides-container">
                            <p>Загрузка...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Уведомления -->
        <div id="notification" class="notification hidden"></div>

        <!-- Модальное окно карты -->
        <div id="mapModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Выберите адрес на карте</h3>
                    <button class="close-btn" onclick="closeMapModal()">✕</button>
                </div>
                <div class="modal-body">
                    <div id="mapContainer" class="map-container"></div>
                    <div id="selectedAddress" class="selected-address hidden">
                        <p><strong>Выбранный адрес:</strong></p>
                        <p id="addressText"></p>
                        <button class="btn btn-primary" onclick="confirmAddress()">Выбрать этот адрес</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Яндекс.Карты -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=437b7c0a-2b9d-4853-9823-6e3c6f3b9767&lang=ru_RU&load=package.full"></script>
    
    <!-- Модули приложения -->
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    
    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(function(registration) {
                console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, function(err) {
                console.log('ServiceWorker registration failed: ', err);
            });
        }
    </script>
</body>
</html>
